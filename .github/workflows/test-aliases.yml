name: Test Aliases Functionally

on:
  push:
   branches:
    - main
    - dev
  pull_request:
  workflow_dispatch:

jobs:
  test-aliases:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate alias configs
        run: bun run generate

      - name: Configure git identity
        run: |
          git config --global user.name  "Test User"
          git config --global user.email "test@example.com"
          git config --global init.defaultBranch main

      - name: Install generated aliases globally
        run: git config --global --add include.path "$GITHUB_WORKSPACE/generated/aliases.gitconfig"

      - name: Set up test repository with realistic state
        run: |
          REPO=/tmp/alias-test-repo
          mkdir "$REPO" && cd "$REPO"
          git init

          # --- commits with content for grep and log tests ---
          mkdir -p src
          printf 'function hello() {\n  return "Hello, world";\n}\n' > src/main.js
          echo "Hello, world"  > hello.txt
          echo "Foo bar baz"   > foo.txt
          git add .
          git commit --message "feat: initial commit"

          echo "Second line"   >> hello.txt
          echo "Another file"  > world.txt
          git add .
          git commit --message "feat: second commit"

          echo "Third change"  >> foo.txt
          git add .
          git commit --message "fix: third commit"

          # --- tags (lightweight and annotated) ---
          git tag v1.0.0
          git tag -a v1.1.0 --message "Release v1.1.0"

          # --- feature branch + merge commit ---
          # HEAD becomes a merge commit; keep the branch so hew-local-dry-run has output
          git checkout -b feature/test-branch
          echo "Feature content" > feature.txt
          git add feature.txt
          git commit --message "feat: feature commit"
          git checkout main
          git merge feature/test-branch --no-ff --message "Merge feature/test-branch"
          # ORIG_HEAD is now set (needed for log-fresh)

          # --- branch description (needed for bsd) ---
          git config branch.main.description "Main integration branch"

          # --- stash entry ---
          echo "Stashed content" > stash-me.txt
          git stash push --include-untracked --message "test stash"

          # --- staged change (for dc / ds / unstage) ---
          echo "Staged change"   >> foo.txt
          git add foo.txt

          # --- unstaged change (for dw / diff-stat / diff-changes) ---
          echo "Unstaged change" >> hello.txt

      - name: Smoke-test all aliases
        working-directory: /tmp/alias-test-repo
        run: |
          pass=0; fail=0; skip=0
          failures=""

          # Run the alias; count pass/fail by exit code.
          ok() {
            local name="$1"; shift
            if git "$name" "$@" > /dev/null 2>&1; then
              echo "✓  git $name${*:+ $*}"
              pass=$((pass + 1))
            else
              local code=$?
              echo "✗  git $name${*:+ $*}  (exit $code)"
              fail=$((fail + 1))
              failures="$failures\n  git $name${*:+ $*}"
            fi
          }

          # Record that an alias is intentionally skipped.
          skip() {
            local name="$1" reason="$2"
            echo "⊘  git $name  — $reason"
            skip=$((skip + 1))
          }

          # ── shortcuts ───────────────────────────────────────────────────────
          skip sw   "requires a branch argument"

          # ── status ──────────────────────────────────────────────────────────
          ok   st

          # ── log ─────────────────────────────────────────────────────────────
          ok   lg
          ok   lo
          ok   lp   -2
          ok   ll
          ok   log-list
          ok   log-fresh                # ORIG_HEAD is set after the merge above
          ok   log-1-day
          ok   log-1-week
          ok   log-my
          ok   log-my-day
          ok   log-my-week
          ok   log-refs
          ok   whatis  HEAD
          ok   last
          ok   commit-search    "feat"
          ok   commit-files     HEAD
          skip ahead   "requires upstream tracking branch"
          skip behind  "requires upstream tracking branch"
          ok   diverged || true
          ok   log-changed      hello.txt
          skip log-local   "requires upstream tracking branch"
          skip log-fetched "requires upstream tracking branch"
          skip showi    "requires interactive fzf"

          # ── diff ────────────────────────────────────────────────────────────
          ok   dc                       # diff --cached (staged change present)
          ok   dw                       # diff --word-diff (unstaged change present)
          ok   diff-deep
          ok   staged                   # diff --staged --stat (staged change present)
          ok   unstaged                 # diff --stat (unstaged change present)
          ok   changed                  # diff --name-status
          ok   conflicts                # no conflicts — exits 0, empty output
          ok   what-changed             # diff --name-only HEAD
          ok   what-staged              # diff --cached --name-only
          ok   diff-range    HEAD~1 HEAD  # still tested; kept in experimental
          skip difftooli     "requires interactive fzf and difftool"

          # ── branch ──────────────────────────────────────────────────────────
          ok   recent
          ok   hew-local-dry-run        # feature/test-branch is merged but not deleted
          skip bed             "alias removed — use git branch --edit-description"
          skip hew             "deletes merged branches locally and remotely"
          skip hew-dry-run     "depends on upstream-branch which has no upstream set"
          skip hew-local       "destructive: deletes locally merged branches"
          skip hew-remote      "requires a remote"
          skip hew-remote-dry-run "requires a remote"
          skip heads           "requires origin remote"

          # ── core ────────────────────────────────────────────────────────────
          ok   root
          # Ensure a staged file, unstage it, then re-stage for later tests.
          git add foo.txt
          ok   unstage  foo.txt
          git add foo.txt

          # ── add ─────────────────────────────────────────────────────────────
          ok   au
          skip aa              "stages all files — keep index stable"
          skip ap              "interactive patch add"

          # ── commit ──────────────────────────────────────────────────────────
          skip ca    "amends last commit — modifies history"
          skip cam   "amends last commit — requires message argument"
          skip cane  "amends last commit — modifies history"
          skip cm    "modifies history — requires message argument"
          skip wip              "commits all changes — modifies history"
          skip unwip            "conditionally resets HEAD — modifies history"
          skip save             "commits all changes — modifies history"
          skip savep            "interactive patch commit"

          # ── stash ───────────────────────────────────────────────────────────
          ok   sl
          ok   ssa                      # shows the stash entry created in setup
          skip sp       "modifies stash stack"
          skip spo      "pops stash — destructive for test state"
          skip sd       "drops stash entry — destructive for test state"
          skip snapshot "pushes to stash — modifies stash state"
          skip spu      "modifies stash stack"
          skip spp      "interactive patch stash"
          skip sli      "requires interactive fzf"

          # ── tag ─────────────────────────────────────────────────────────────
          ok   tags
          ok   last-tag
          ok   last-tagged

          # ── ls ──────────────────────────────────────────────────────────────
          ok   untracked            # ls-files --others (no untracked files — exits 0)
          ok   tracked              # ls-files
          ok   ignored              # status --ignored --short (exits 0)

          # ── grep ────────────────────────────────────────────────────────────
          ok   grep-group  "Hello"
          ok   grep-all    "Hello"

          # ── reflog ──────────────────────────────────────────────────────────
          ok   rl

          # ── util ────────────────────────────────────────────────────────────
          ok   aliases
          ok   assumed
          ok   default-branch
          ok   current-branch
          ok   upstream-branch          # exits 0, outputs empty when no upstream
          ok   rev-list-all-objects-by-size-and-name
          ok   large-files
          ok   bl               src/main.js
          ok   verify
          skip bli             "requires interactive fzf"
          skip init-empty      "initializes a new repository"
          skip assume          "requires a file argument; side-effect on index"
          skip unassume        "requires a file argument; side-effect on index"
          skip unassume-all    "side-effect on index"

          # ── remote ──────────────────────────────────────────────────────────
          ok   remotes-prune            # no remotes — exits 0
          skip remotes-push-dry-run "requires a remote"

          # ── fetch ───────────────────────────────────────────────────────────
          skip fa    "requires a remote"
          skip fap   "requires a remote"

          # ── pull ────────────────────────────────────────────────────────────
          skip pf    "requires upstream tracking branch"
          skip pr    "requires upstream tracking branch"

          # ── checkout ────────────────────────────────────────────────────────
          skip co    "requires a target ref"
          skip swb   "requires a new branch name"
          skip swi   "requires fzf installed"

          # ── merge ───────────────────────────────────────────────────────────
          skip ma    "only valid during an in-progress merge"
          skip mc    "only valid during an in-progress merge"
          skip rebase-branch       "interactive rebase"
          skip ours    "only valid during a merge conflict"
          skip theirs  "only valid during a merge conflict"

          # ── rebase ──────────────────────────────────────────────────────────
          skip rb    "requires a target branch"
          skip rba   "only valid during an in-progress rebase"
          skip rbc   "only valid during an in-progress rebase"
          skip rbs   "only valid during an in-progress rebase"
          skip rbi   "interactive rebase"
          skip rbiu  "interactive rebase — requires upstream"
          skip fixup "interactive rebase"
          skip remote-ref     "requires upstream tracking branch"
          skip rebase-recent  "requires upstream tracking branch"

          # ── cherry-pick ─────────────────────────────────────────────────────
          skip cp    "requires a commit SHA argument"
          skip cpa   "only valid during an in-progress cherry-pick"
          skip cpc   "only valid during an in-progress cherry-pick"

          # ── revert ──────────────────────────────────────────────────────────
          skip rv    "modifies history — requires a commit SHA argument"
          skip rvnc  "modifies history — requires a commit SHA argument"

          # ── reset ───────────────────────────────────────────────────────────
          ok   clean-dry                # preview of what would be deleted
          ok   unstage-all              # restore --staged . (unstages foo.txt staged above)
          skip unadd               "would unstage files needed for subsequent tests"
          skip uncommit        "modifies commit history"
          skip discard-all         "destructive: discards all working-tree changes"
          skip discard-file        "destructive: discards working-tree changes to a file"
          skip restore-file        "destructive: discards working-tree changes to a file"
          skip expunge     "requires git-filter-repo; reads from /dev/tty"
          skip reset-hard-safe "reads from /dev/tty"

          # ── worktree ────────────────────────────────────────────────────────
          ok   wt-path          main    # prints canonical path, exits 0
          ok   wt-list
          ok   wt-prune
          skip wt-new          "creates a worktree — requires filesystem side-effects"
          skip wt-open         "creates a worktree (filesystem side effect); may require interactive fzf when no branch is given"
          skip wt-open-cd      "creates a worktree — filesystem side effect"
          skip wt-rm           "requires an existing worktree to remove"
          skip wt-done         "requires an existing worktree"
          skip wt-done-force   "destructive: force-removes a worktree and its branch"
          skip wt-feature      "creates a worktree — requires filesystem side-effects"
          skip wt-bugfix       "creates a worktree — requires filesystem side-effects"
          skip wt-hotfix       "creates a worktree — requires filesystem side-effects"
          skip wt-release      "creates a worktree — requires filesystem side-effects"
          skip wt-sync         "requires an existing worktree"

          # ── submodule ───────────────────────────────────────────────────────
          ok   smu              # no submodules — no-op, exits 0
          ok   smui
          ok   smuir
          skip smi   "requires a submodule URL"

          # ── workflow ────────────────────────────────────────────────────────
          ok   pruner
          ok   repacker
          ok   optimizer
          skip outbound        "requires upstream tracking branch"
          skip inbound         "requires a remote"
          skip get             "requires a remote"
          skip pushy           "requires a remote"
          skip pushy-check     "requires upstream tracking branch and a remote"
          skip push-safe       "requires upstream tracking branch and a remote"
          skip pr-ready        "interactive rebase — requires upstream tracking branch"
          skip track           "requires a remote"
          skip untrack         "requires upstream tracking branch"
          skip publish         "requires a remote"
          skip unpublish       "requires a remote"
          skip cloner          "requires a URL argument"
          skip clone-lean      "requires a URL argument"
          skip mainly          "interactive — reads from /dev/tty"
          skip sync            "requires upstream tracking branch"
          skip sparse-init     "changes sparse-checkout mode"
          skip sparse-set      "requires sparse-checkout path arguments"
          skip task-ready      "requires upstream tracking branch"

          # ── topic ───────────────────────────────────────────────────────────
          ok   topic-base-branch
          skip topic-start   "requires a remote"
          skip topic-end     "requires a remote"
          skip topic-sync    "requires a remote"
          skip topic-move    "requires a remote"

          # ── analytics ───────────────────────────────────────────────────────
          ok   log-of-format-and-count            "%an"
          ok   log-of-count-and-format            "%an"
          ok   log-of-format-and-count-with-date  "%aE" "%Y-%m"
          ok   log-of-count-and-format-with-date  "%aE" "%Y-%m"
          ok   log-of-email-and-count
          ok   log-of-count-and-email
          ok   log-of-day-and-count
          ok   log-of-count-and-day
          ok   log-of-week-and-count
          ok   log-of-count-and-week
          ok   log-of-hour-and-count
          ok   log-of-count-and-hour
          ok   log-of-month-and-count
          ok   log-of-count-and-month
          ok   chart
          ok   churn
          ok   who
          ok   whois   "Test User"
          ok   summary

          # ── experimental ────────────────────────────────────────────────────
          ok   lor
          ok   lfp
          ok   log-list-long
          ok   lll
          ok   log-1-hour
          ok   log-1-month
          ok   log-my-month
          ok   grep-ack    "Hello"
          ok   grep-group  "Hello"
          skip diff-all    "requires configured difftool"
          ok   branch-commit-first
          ok   branch-commit-last
          ok   rev-list-all-objects-by-size
          ok   show-unreachable        || true      # may be empty — exits 0 with xargs
          ok   merge-span   " " HEAD   || true      # needs a merge SHA
          ok   remotes-push-dry-run    || true      # no remotes — exits 0
          skip issues          "requires consistent ISSUE-NNN commit discipline"
          skip log-1-month     "already tested above as experimental"
          skip mncnf           "requires a branch name argument"
          skip merge-span-log  "requires a merge-commit SHA argument"
          skip merge-span-diff "requires a merge-commit SHA argument"
          skip prp             "requires upstream tracking branch"
          skip cob             "requires a new branch name"
          skip cpn             "requires a commit SHA argument"
          skip cherry-pick-merge "requires a merge-commit SHA argument"
          skip undo-commit-hard   "destructive: discards committed changes"
          skip undo-to-upstream   "destructive — requires upstream tracking branch"
          skip clean-force        "destructive: removes untracked files"
          skip add-unmerged    "no unmerged files present"
          skip edit-modified   "opens editor interactively"
          skip track-all-remote-branches "requires a remote"
          skip branch-commit-prev "alias removed"
          skip branch-commit-next "alias removed"
          skip branch-clean    "requires interactive fzf"
          skip add-alias       "modifies git config"
          skip move-alias      "modifies git config"
          skip assume-all      "side-effect on index"
          skip serve           "starts a network daemon"
          skip archive         "creates a tar archive"
          skip put-dry-run     "push dry-run reflects pre-commit state"
          skip reincarnate     "destructive — requires a remote"

          # ── final report ────────────────────────────────────────────────────
          printf "\n──────────────────────────────────────────────────────\n"
          printf "Results: %d passed  %d failed  %d skipped\n" \
                 "$pass" "$fail" "$skip"
          if [ "$fail" -gt 0 ]; then
            printf "\nFailed aliases:%b\n" "$failures"
            exit 1
          fi
