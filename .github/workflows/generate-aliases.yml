name: Generate aliases

on:
  push:
    branches:
      - main
    paths:
      - 'aliases/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Use a token that allows pushing back to the repo.
          # Either use a PAT stored as a secret, or the default GITHUB_TOKEN
          # with `contents: write` permission (works for same-repo pushes).
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Generate alias configs and docs
        run: bun run generate

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet generated/ docs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/ docs/
          git commit --message "chore: regenerate alias configs and docs [skip ci]"
          git push
