name: CI

on:
  push:
   branches:
    - main
    - dev
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run generate
      - run: bun test
      - run: bun run build
      - run: git diff --exit-code
