aliases:
  s:
    command: status --short --branch
    description: Compact status with branch info
    category: core
    risk: safe

  co:
    command: checkout
    description: Checkout branch or path
    category: core
    risk: safe

  cob:
    command: checkout -b
    description: Create and checkout a new branch
    category: branch
    risk: safe

  cm:
    command: commit -m
    description: Commit with message
    category: commit
    risk: safe

  amend:
    command: commit --amend --no-edit
    description: Amend last commit without editing message
    category: commit
    risk: medium

  pf:
    command: push --force-with-lease
    description: Safer force push
    category: push
    risk: medium
