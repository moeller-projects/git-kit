aliases:
  s:
    command: status --short --branch
    description: Compact status with branch info
    category: core
    risk: safe

  co:
    command: checkout
    description: Checkout branch or path
    category: core
    risk: safe

  unstage:
    command: restore --staged
    description: Unstage files from the index
    category: core
    risk: safe

  discard:
    command: restore
    description: Discard working directory changes
    category: core
    risk: medium

  root:
    command: rev-parse --show-toplevel
    description: Print the repository root directory
    category: core
    risk: safe
