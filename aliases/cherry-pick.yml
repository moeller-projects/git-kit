aliases:
  cp:
    command: cherry-pick
    description: Apply a commit from another branch
    category: cherry-pick
    risk: medium

  cpa:
    command: cherry-pick --abort
    description: Abort a cherry-pick in progress
    category: cherry-pick
    risk: medium

  cpc:
    command: cherry-pick --continue
    description: Continue a cherry-pick in progress
    category: cherry-pick
    risk: medium
