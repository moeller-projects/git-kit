aliases:
  cp:
    command: cherry-pick
    description: Apply a commit from another branch
    category: cherry-pick
    risk: medium

  cpa:
    command: cherry-pick --abort
    description: Abort a cherry-pick in progress
    category: cherry-pick
    risk: medium

  cpc:
    command: cherry-pick --continue
    description: Continue a cherry-pick in progress
    category: cherry-pick
    risk: medium

  cpn:
    command: cherry-pick --no-commit
    description: Cherry-pick without committing
    category: cherry-pick
    risk: medium

  cpnx:
    command: cherry-pick --no-commit -x
    description: Cherry-pick without committing, appending origin info
    category: cherry-pick
    risk: medium

  cherry-pick-merge:
    command: "!sh -c 'git cherry-pick --no-commit --mainline 1 $0 && git log -1 --pretty=%P $0 | cut -b 42- > .git/MERGE_HEAD && git commit --verbose'"
    description: Cherry-pick a merge commit
    category: cherry-pick
    risk: medium
