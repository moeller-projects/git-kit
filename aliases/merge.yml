aliases:
  ma:
    command: merge --abort
    description: Abort an in-progress merge
    category: merge
    risk: medium

  mc:
    command: merge --continue
    description: Continue an in-progress merge
    category: merge
    risk: medium

  rebase-branch:
    command: '!f() { git rebase --interactive "$(git merge-base "$(git default-branch)" HEAD)"; }; f'
    description: Interactively rebase all commits on the current branch
    category: merge
    risk: medium

  ours:
    command: '!f() { git checkout --ours   "$@" && git add "$@"; }; f'
    description: During a merge conflict, take our version of a file
    category: merge
    risk: medium

  theirs:
    command: '!f() { git checkout --theirs "$@" && git add "$@"; }; f'
    description: During a merge conflict, take their version of a file
    category: merge
    risk: medium

  mgi:
    command: '!f() { command -v fzf >/dev/null 2>&1 || { echo "mgi needs fzf" >&2; return 2; }; b="$(git for-each-ref --format="%(refname:short)" refs/heads/ refs/remotes/origin/ | grep -v "^origin/HEAD$" | fzf --preview "git log --oneline --color=always -20 {}" --prompt="merge> ")"; [ -n "$b" ] || return 0; git merge "$b"; }; f'
    description: Interactively pick a branch to merge into the current one (requires fzf)
    category: merge
    risk: medium

  bump:
    command: '!f() { base="${1:-$(git topic-base-branch)}"; git fetch origin "$base" && git merge "origin/$base" --no-ff -m "merge origin/$base into $(git current-branch)"; }; f'
    description: Fetch the base branch and merge it into the current topic branch (no rebase)
    category: merge
    risk: medium
    depends_on: [topic-base-branch, current-branch]

  conflict-show:
    command: '!f() { git diff --name-only --diff-filter=U | while IFS= read -r f; do echo "=== $f ==="; awk ''/^<<<<<<< /,/^>>>>>>> /'' "$f"; done; }; f'
    description: Show all conflict hunks across all unmerged files
    category: merge
    risk: medium

  conflict-mine:
    command: '!f() { files=$(git diff --name-only --diff-filter=U); [ -n "$files" ] || { echo "no unmerged files" >&2; return 1; }; echo "$files" | xargs git checkout --ours -- && echo "$files" | xargs git add --; }; f'
    description: Resolve all current conflicts by taking the local (ours) version of every unmerged file
    category: merge
    risk: medium

  conflict-theirs:
    command: '!f() { files=$(git diff --name-only --diff-filter=U); [ -n "$files" ] || { echo "no unmerged files" >&2; return 1; }; echo "$files" | xargs git checkout --theirs -- && echo "$files" | xargs git add --; }; f'
    description: Resolve all current conflicts by taking the remote (theirs) version of every unmerged file
    category: merge
    risk: medium
