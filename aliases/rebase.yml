aliases:
  rb:
    command: rebase
    description: Rebase the current branch
    category: rebase
    risk: medium

  rba:
    command: rebase --abort
    description: Abort an in-progress rebase
    category: rebase
    risk: medium

  rbc:
    command: rebase --continue
    description: Continue an in-progress rebase
    category: rebase
    risk: medium

  rbs:
    command: rebase --skip
    description: Skip the current patch during rebase
    category: rebase
    risk: medium

  rbi:
    command: rebase --interactive
    description: Rebase interactively
    category: rebase
    risk: medium

  rbiu:
    command: rebase --interactive @{upstream}
    description: Rebase interactively on unpushed commits
    category: rebase
    risk: medium

  fixup:
    command: '!f() { TARGET="$(git rev-parse "$1")"; git commit --fixup="$TARGET" && GIT_EDITOR=true git rebase --interactive --autosquash "$TARGET"~; }; f'
    description: Create a fixup commit and immediately rebase-autosquash it
    category: rebase
    risk: medium

  remote-ref:
    command: '!local_ref="$(git symbolic-ref HEAD)"; local_name="${local_ref##refs/heads/}"; remote="$(git config branch."$local_name".remote || echo origin)"; remote_ref="$(git config branch."$local_name".merge)"; remote_name="${remote_ref##refs/heads/}"; echo "remotes/$remote/$remote_name" #'
    description: Print the remote-tracking ref for the current branch
    category: rebase
    risk: medium

  rebase-recent:
    command: '!git rebase --interactive "$(git remote-ref)"'
    description: Interactively rebase commits not yet pushed
    category: rebase
    risk: medium
    depends_on: [remote-ref]

  reup:
    command: '!f() { base="${1:-$(git topic-base-branch)}"; git fetch origin "$base" && git rebase "origin/$base"; }; f'
    description: Fetch the base branch and rebase the current topic branch onto it
    category: rebase
    risk: medium

  fixupi:
    command: '!f() { command -v fzf >/dev/null 2>&1 || { echo "fixupi needs fzf" >&2; return 2; }; base="${1:-$(git topic-base-branch)}"; sha="$(git log --oneline "$base..HEAD" | fzf --prompt="fixup into> " --preview "git show --color=always {1}" | cut -d" " -f1)"; [ -n "$sha" ] || return 0; git commit --fixup "$sha" && GIT_EDITOR=true git rebase --interactive --autosquash "$sha~"; }; f'
    description: Interactively pick a commit on the current branch to fixup staged changes into (requires fzf)
    category: rebase
    risk: medium
