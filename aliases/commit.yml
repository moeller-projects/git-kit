aliases:
  ca:
    command: commit --amend
    description: Amend the tip of the current branch
    category: commit
    risk: medium

  cam:
    command: commit --amend --message
    description: Amend the tip of the current branch with a new message
    category: commit
    risk: medium

  cane:
    command: commit --amend --no-edit
    description: Amend the tip of the current branch without editing the message
    category: commit
    risk: medium

  cm:
    command: commit --message
    description: Commit with a message
    category: commit
    risk: medium

  wip:
    command: '!git add --all && git commit --message=wip'
    description: Stage all changes and commit with message "wip"
    category: commit
    risk: medium

  unwip:
    command: "!f() { msg=\"$(git log -1 --pretty=%s)\"; test \"$msg\" = \"wip\" || { echo \"last commit message is not 'wip' (found: '${msg}')\"; return 1; }; git reset HEAD~1; }; f"
    description: Undo the last commit only if its message is exactly "wip"
    category: commit
    risk: medium

  save:
    command: '!f() { msg="${1:-wip}"; git add --all && git commit --message "$msg"; }; f'
    description: Stage all changes and commit with a message defaulting to wip
    category: commit
    risk: medium

  savep:
    command: '!f() { msg="${1:-wip}"; git add --patch && git commit --message "$msg"; }; f'
    description: Patch-stage changes and commit with a message defaulting to wip
    category: commit
    risk: medium
