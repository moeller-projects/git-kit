aliases:
  gn:
    command: grep --line-number
    description: Grep with line numbers
    category: grep
    risk: safe

  gg:
    command: grep-group
    description: Grep with grouped output (a.k.a. grep-group)
    category: grep
    risk: safe

  grep-all:
    command: '!f() { git rev-list --all | xargs git grep "$@"; }; f'
    description: Find text in any commit ever
    category: grep
    risk: medium

  grep-group:
    command: grep --break --heading --line-number --color
    description: Find text and group the output lines
    category: grep
    risk: safe

  grep-ack:
    command: -c color.grep.linenumber="bold yellow" -c color.grep.filename="bold green" -c color.grep.match="reverse yellow" grep --break --heading --line-number
    description: Find text with ack-like formatting
    category: grep
    risk: safe
