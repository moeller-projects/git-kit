aliases:
  snapshot:
    command: '!git stash push --include-untracked --message "snapshot: $(date)" && git stash apply "stash@{0}" --index'
    description: Snapshot working tree to stash without removing changes
    category: stash
    risk: medium

  sp:
    command: stash push
    description: Push current changes onto the stash stack
    category: stash
    risk: medium

  sl:
    command: stash list
    description: List all stash entries
    category: stash
    risk: safe

  sd:
    command: stash drop
    description: Drop the most recent stash entry
    category: stash
    risk: medium

  spo:
    command: stash pop
    description: Pop and apply the most recent stash entry
    category: stash
    risk: medium

  ssa:
    command: stash show --patch
    description: Show the most recent stash entry as a full patch diff
    category: stash
    risk: safe

  spu:
    command: stash push --include-untracked
    description: Stash including untracked files
    category: stash
    risk: medium

  spp:
    command: stash push --patch
    description: Interactively stash changes
    category: stash
    risk: medium

  sli:
    command: '!git stash list | fzf'
    description: Interactively browse stash entries
    category: stash
    risk: medium
