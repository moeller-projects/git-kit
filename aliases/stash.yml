aliases:
  snapshot:
    command: '!git stash push --include-untracked --message "snapshot: $(date)" && git stash apply "stash@{0}" --index'
    description: Snapshot working tree to stash without removing changes
    category: stash
    risk: medium

  sp:
    command: stash push
    description: Push current changes onto the stash stack
    category: stash
    risk: medium

  sl:
    command: stash list
    description: List all stash entries
    category: stash
    risk: safe

  sd:
    command: stash drop
    description: Drop the most recent stash entry
    category: stash
    risk: medium

  spo:
    command: stash pop
    description: Pop and apply the most recent stash entry
    category: stash
    risk: medium

  ssa:
    command: stash show --patch
    description: Show the most recent stash entry as a full patch diff
    category: stash
    risk: safe

  spu:
    command: stash push --include-untracked
    description: Stash including untracked files
    category: stash
    risk: medium

  spp:
    command: stash push --patch
    description: Interactively stash changes
    category: stash
    risk: medium

  sli:
    command: '!git stash list | fzf'
    description: Interactively browse stash entries
    category: stash
    risk: medium

  spn:
    command: '!f() { name="${1:?usage: git spn <name> [paths...]}"; shift; git stash push --message "$name" -- "$@"; }; f'
    description: "Stash changes with a custom name; usage: git spn <name> [paths...]"
    category: stash
    risk: medium

  spr:
    command: '!f() { name="$1"; ref="$(git stash list | grep -E ": ${name}$" | head -1 | sed -E "s/:.*//")"; [ -n "$ref" ] || { printf "no stash matching %s\n" "$name" >&2; return 1; }; git stash pop "$ref"; }; f'
    description: "Pop a stash entry by its -m name; usage: git spr <name>"
    category: stash
    risk: medium
