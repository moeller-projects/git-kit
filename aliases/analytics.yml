aliases:
  log-of-format-and-count:
    command: "!f() { format=\"$1\"; shift; git log \"$@\" --format=oneline --format=\"$format\" | awk '{a[$0]++}END{for(i in a){print i, a[i], int((a[i]/NR)*100) \"%\"}}' | sort; }; f"
    description: Count log entries grouped by a format string (ascending)
    category: analytics
    risk: medium

  log-of-count-and-format:
    command: "!f() { format=\"$1\"; shift; git log \"$@\" --format=oneline --format=\"$format\" | awk '{a[$0]++}END{for(i in a){print a[i], int((a[i]/NR)*100) \"%\", i}}' | sort -nr; }; f"
    description: Count log entries grouped by a format string (descending)
    category: analytics
    risk: medium

  log-of-format-and-count-with-date:
    command: "!f() { format=\"$1\"; shift; date_format=\"$1\"; shift; git log \"$@\" --format=oneline --format=\"$format\" --date=format:\"$date_format\" | awk '{a[$0]++}END{for(i in a){print i, a[i], int((a[i]/NR)*100) \"%\"}}' | sort -r; }; f"
    description: Count log entries by format string and date (ascending)
    category: analytics
    risk: medium

  log-of-count-and-format-with-date:
    command: "!f() { format=\"$1\"; shift; date_format=\"$1\"; shift; git log \"$@\" --format=oneline --format=\"$format\" --date=format:\"$date_format\" | awk '{a[$0]++}END{for(i in a){print a[i], int((a[i]/NR)*100) \"%\", i}}' | sort -nr; }; f"
    description: Count log entries by format string and date (descending)
    category: analytics
    risk: medium

  log-of-email-and-count:
    command: '!f() { git log-of-format-and-count "%aE" "$@"; }; f'
    description: Count commits per author email (ascending)
    category: analytics
    risk: medium

  log-of-count-and-email:
    command: '!f() { git log-of-count-and-format "%aE" "$@"; }; f'
    description: Count commits per author email (descending)
    category: analytics
    risk: medium

  log-of-day-and-count:
    command: '!f() { git log-of-format-and-count-with-date "%ad" "%Y-%m-%d" "$@" ; }; f'
    description: Count commits per calendar day (ascending)
    category: analytics
    risk: medium

  log-of-count-and-day:
    command: '!f() { git log-of-count-and-format-with-date "%ad" "%Y-%m-%d" "$@" ; }; f'
    description: Count commits per calendar day (descending)
    category: analytics
    risk: medium

  log-of-week-and-count:
    command: '!f() { git log-of-format-and-count-with-date "%ad" "%Y#%V" "$@"; }; f'
    description: Count commits per ISO week (ascending)
    category: analytics
    risk: medium

  log-of-count-and-week:
    command: '!f() { git log-of-count-and-format-with-date "%ad" "%Y#%V" "$@"; }; f'
    description: Count commits per ISO week (descending)
    category: analytics
    risk: medium

  log-of-hour-and-count:
    command: '!f() { git log-of-format-and-count-with-date "%ad" "%Y-%m-%dT%H" "$@" ; }; f'
    description: Count commits per hour (ascending); niche — prefer day/week granularity for daily use
    category: analytics
    risk: medium

  log-of-count-and-hour:
    command: '!f() { git log-of-count-and-format-with-date "%ad" "%Y-%m-%dT%H" "$@" ; }; f'
    description: Count commits per hour (descending); niche — prefer day/week granularity for daily use
    category: analytics
    risk: medium

  log-of-month-and-count:
    command: '!f() { git log-of-format-and-count-with-date "%ad" "%Y-%m" "$@" ; }; f'
    description: Count commits per calendar month (ascending)
    category: analytics
    risk: medium

  log-of-count-and-month:
    command: '!f() { git log-of-count-and-format-with-date "%ad" "%Y-%m" "$@" ; }; f'
    description: Count commits per calendar month (descending)
    category: analytics
    risk: medium

  chart:
    command: "!f() { git log --format=oneline --format=\"%aE %at\" --since=6-weeks-ago \"$*\" | awk ' function time_to_slot(t) { return strftime(\"%Y-%m-%d\", t, true) } function count_to_char(i) { return (i > 0) ? ((i < 10) ? i : \"X\") : \".\" } BEGIN { time_min = systime(); time_max = 0; SECONDS_PER_DAY=86400; } { item = $1; time = 0 + $2; if (time > time_max){ time_max = time } else if (time < time_min){ time_min = time }; slot = time_to_slot(time); items[item]++; slots[slot]++; views[item, slot]++; } END{ printf(\"Chart time range %s to %s.\\\\n\", time_to_slot(time_min), time_to_slot(time_max)); time_max_add = time_max += SECONDS_PER_DAY; for(item in items){ row = \"\"; for(time = time_min; time < time_max_add; time += SECONDS_PER_DAY) { slot = time_to_slot(time); count = views[item, slot]; row = row count_to_char(count); } print row, item; } }'; }; f"
    description: Show a per-author activity chart for the past 6 weeks
    category: analytics
    risk: medium

  churn:
    command: "!f() { git log --all --find-copies --find-renames --name-only --format='format:' \"$@\" | awk 'NF{a[$0]++}END{for(i in a){print a[i], i}}' | sort -rn;};f"
    description: Show files sorted by how frequently they change (most-churned first)
    category: analytics
    risk: medium

  summary:
    command: "!f() { printf \"Summary of this branch...\\n\"; printf \"%s\\n\" \"$(git current-branch)\"; printf \"%s first commit timestamp\\n\" \"$(git log --date-order --format=%cI | tail -1)\"; printf \"%s last commit timestamp\\n\" \"$(git log -1 --date-order --format=%cI)\"; printf \"\\nSummary of counts...\\n\"; printf \"%d commit count\\n\" \"$(git rev-list --count HEAD)\"; printf \"%d date count\\n\" \"$(git log --format=oneline --format=\"%ad\" --date=format:\"%Y-%m-%d\" | awk '{a[$0]=1}END{for(i in a){n++;} print n}')\"; printf \"%d tag count\\n\" \"$(git tag | wc -l)\"; printf \"%d author count\\n\" \"$(git log --format=oneline --format=\"%aE\" | awk '{a[$0]=1}END{for(i in a){n++;} print n}')\"; printf \"%d committer count\\n\" \"$(git log --format=oneline --format=\"%cE\" | awk '{a[$0]=1}END{for(i in a){n++;} print n}')\"; printf \"%d local branch count\\n\" \"$(git branch | grep -vc \" -> \")\"; printf \"%d remote branch count\\n\" \"$(git branch --remotes | grep -vc \" -> \")\"; printf \"\\nSummary of this directory...\\n\"; printf \"%s\\n\" \"$(pwd)\"; printf \"%d file count via git ls-files\\n\" \"$(git ls-files | wc -l)\"; printf \"%d file count via find command\\n\" \"$(find . | wc -l)\"; printf \"%d disk usage\\n\" \"$(du -s | awk '{print $1}')\"; printf \"\\nMost-active authors, with commit count and %%...\\n\"; if out=$(git log-of-count-and-email 2>/dev/null); then echo \"$out\" | head -7; else echo \"[unavailable]\"; fi; printf \"\\nMost-active dates, with commit count and %%...\\n\"; if out=$(git log-of-count-and-day 2>/dev/null); then echo \"$out\" | head -7; else echo \"[unavailable]\"; fi; printf \"\\nMost-active files, with churn count\\n\"; if out=$(git churn 2>/dev/null); then echo \"$out\" | head -7; else echo \"[unavailable]\"; fi; }; f"
    description: Print a summary dashboard of repository metrics
    category: analytics
    risk: medium

  whois:
    command: "!sh -c 'git log --regexp-ignore-case -1 --pretty=\"format:%an <%ae>\\n\" --author=\"$1\"' -"
    description: Look up a contributor by name or email substring
    category: analytics
    risk: medium

  who:
    command: shortlog --summary --numbered --no-merges
    description: Show commit counts per contributor (contributor leaderboard)
    category: analytics
    risk: safe
