aliases:
  last-tag:
    command: describe --tags --abbrev=0
    description: Show the last tag on the current branch
    category: tag
    risk: safe

  last-tagged:
    command: '!git describe --tags "$(git rev-list --tags --max-count=1)"'
    description: Show the last annotated tag across all branches
    category: tag
    risk: medium

  tags:
    command: tag -n1 --list
    description: List all tags with their messages
    category: tag
    risk: safe

  tag-push:
    command: '!f() { tag="${1:-$(date +%Y.%m.%d)}"; git tag -a "$tag" -m "release $tag" && git push origin "$tag"; }; f'
    description: "Create an annotated tag and push it to origin; usage: git tag-push [tagname]"
    category: tag
    risk: medium
