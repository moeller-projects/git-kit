aliases:
  last-tag:
    command: describe --tags --abbrev=0
    description: Show the last tag on the current branch
    category: tag
    risk: safe

  last-tagged:
    command: '!git describe --tags "$(git rev-list --tags --max-count=1)"'
    description: Show the last annotated tag across all branches
    category: tag
    risk: medium

  tags:
    command: tag -n1 --list
    description: List all tags with their messages
    category: tag
    risk: safe
