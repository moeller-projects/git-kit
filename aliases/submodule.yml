aliases:
  sm:
    command: submodule
    description: Manage submodules
    category: submodule
    risk: safe

  smi:
    command: submodule init
    description: Initialize submodules
    category: submodule
    risk: medium

  sma:
    command: submodule add
    description: Add a submodule
    category: submodule
    risk: medium

  sms:
    command: submodule sync
    description: Sync submodule URLs
    category: submodule
    risk: medium

  smu:
    command: submodule update
    description: Update submodules
    category: submodule
    risk: medium

  smui:
    command: submodule update --init
    description: Update and initialize submodules
    category: submodule
    risk: medium

  smuir:
    command: submodule update --init --recursive
    description: Update, initialize, and recurse into nested submodules
    category: submodule
    risk: medium
