aliases:
  init-empty:
    command: "!f() { git init && git commit --allow-empty --allow-empty-message --message ''; }; f"
    description: Create an empty initial commit for a cleaner rebasing history
    category: util
    risk: medium

  assume:
    command: update-index --assume-unchanged
    description: Tell git to ignore changes to a file
    category: util
    risk: medium

  unassume:
    command: update-index --no-assume-unchanged
    description: Restore git tracking of changes to a file
    category: util
    risk: medium

  unassume-all:
    command: '!git assumed | xargs -r git update-index --no-assume-unchanged'
    description: Restore tracking for all assumed-unchanged files
    category: util
    risk: medium

  assumed:
    command: '!git ls-files -v | grep ^h | cut -c 3-'
    description: List all files marked as assume-unchanged
    category: util
    risk: medium

  aliases:
    command: "!git config --get-regexp '^alias\\.' | cut -c 7- | sed 's/ / = /'"
    description: List all git aliases
    category: util
    risk: medium

  default-branch:
    command: config init.defaultBranch
    description: Show the configured default branch name
    category: util
    risk: safe

  current-branch:
    command: rev-parse --abbrev-ref HEAD
    description: Show the current branch name
    category: util
    risk: safe

  upstream-branch:
    command: "!git for-each-ref --format='%(upstream:short)' \"$(git symbolic-ref -q HEAD)\""
    description: Show the upstream tracking branch for the current branch
    category: util
    risk: medium

  rev-list-all-objects-by-size-and-name:
    command: '!git rev-list --all --objects | git cat-file --batch-check=''%(objecttype) %(objectname) %(objectsize) %(rest)'' | awk ''/^blob/ {print substr($0,6)}'' | sort --numeric-sort --key=2'
    description: List all blobs in history sorted by size with filename
    category: util
    risk: medium

  large-files:
    command: "!git rev-list --objects --all | git cat-file --batch-check='%(objecttype) %(objectname) %(objectsize) %(rest)' | awk '/^blob/ {size=$3; sub(/^[^ ]+ [^ ]+ [^ ]+ /,\"\"); print size, $0}' | sort -nr | head -50"
    description: Show the 50 largest blobs in the repository
    category: util
    risk: medium

  bl:
    command: blame
    description: Show what revision and author last modified each line of a file
    category: util
    risk: safe

  bli:
    command: '!f() { file=$(git ls-files | fzf); [ -n "$file" ] && git blame -- "$file"; }; f'
    description: Interactively select a file and blame it
    category: util
    risk: medium

  verify:
    command: fsck --full
    description: Verify the connectivity and validity of objects in the database
    category: util
    risk: safe
