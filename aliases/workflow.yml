aliases:
  cloner:
    command: clone --recursive
    description: Clone a repository including all submodules
    category: workflow
    risk: medium

  clone-lean:
    command: clone --depth 1 --filter=combine:blob:none+tree:0 --no-checkout
    description: Minimal clone skipping unneeded blobs and trees
    category: workflow
    risk: medium

  panic:
    command: '!tar cvf ../panic.tar -- *'
    description: Archive working tree as a tar file for emergency backup
    category: workflow
    risk: medium

  archive:
    command: '!f() { top="$(git rev-parse --show-toplevel)"; cd "$top" || exit 1 ; tar cvf "$top.tar" "$top" ; }; f'
    description: Create a tar archive of the entire repository
    category: workflow
    risk: medium

  pushy:
    command: push --force-with-lease
    description: Force-push using --force-with-lease for safety
    category: workflow
    risk: dangerous

  pushy-check:
    command: '!git log @{upstream}.. && git push --force-with-lease'
    description: Show unreviewed commits ahead of upstream, then force-push with --force-with-lease
    category: workflow
    risk: dangerous

  get:
    command: '!git fetch --prune && git pull --rebase && git submodule update --init --recursive'
    description: Fetch, rebase pull, and update all submodules
    category: workflow
    risk: medium

  put:
    command: '!git commit --all && git push'
    description: Commit all changes and push
    category: workflow
    risk: medium

  put-dry-run:
    command: '!git commit --all --dry-run && git push --dry-run'
    description: Preview what put would commit and push without making any changes
    category: workflow
    risk: medium

  mainly:
    command: "!f() { branch=\"$(git default-branch)\"; printf \"WARNING: This will hard-reset '%s' to 'origin/%s'. Continue? [y/N] \" \"$branch\" \"$branch\"; read -r ans </dev/tty; case \"$ans\" in [yY]*) git checkout \"$branch\" && git fetch origin --prune && git reset --hard \"origin/$branch\" ;; *) echo \"Aborted.\" ;; esac; }; f"
    description: Reset local branch to match origin main (prompts for confirmation before hard-reset)
    category: workflow
    risk: dangerous
    depends_on: [default-branch]

  ignore:
    command: '!git status | grep -P "^\\t" | grep -vF .gitignore | sed "s/^\\t//" >> .gitignore'
    description: Append all untracked files to .gitignore
    category: workflow
    risk: medium

  push1:
    command: '!git push origin "$(git current-branch)"'
    description: Push the current branch to origin
    category: workflow
    risk: medium
    depends_on: [current-branch]

  pull1:
    command: '!git pull origin "$(git current-branch)"'
    description: Pull the current branch from origin
    category: workflow
    risk: medium
    depends_on: [current-branch]

  track:
    command: '!f(){ branch="$(git current-branch)"; cmd="git branch $branch --set-upstream-to=${1:-origin}/${2:-$branch}"; echo "$cmd"; $cmd; }; f'
    description: Set the upstream tracking branch
    category: workflow
    risk: medium
    depends_on: [current-branch]

  untrack:
    command: '!f(){ branch="$(git current-branch)"; cmd="git branch --unset-upstream ${1:-$branch}"; echo "$cmd"; $cmd; }; f'
    description: Remove the upstream tracking branch
    category: workflow
    risk: medium
    depends_on: [current-branch]

  publish:
    command: '!f() { git push --set-upstream "${1:-origin}" "$(git current-branch)"; }; f'
    description: Push current branch and set upstream
    category: workflow
    risk: medium
    depends_on: [current-branch]

  unpublish:
    command: '!f() { git push "${1:-origin}" :"$(git current-branch)"; }; f'
    description: Delete the remote version of the current branch
    category: workflow
    risk: dangerous
    depends_on: [current-branch]

  inbound:
    command: '!git remote update --prune; git log ..@{upstream}'
    description: Show incoming commits from upstream
    category: workflow
    risk: medium

  outbound:
    command: log @{upstream}..
    description: Show outgoing commits not yet pushed
    category: workflow
    risk: safe

  reincarnate:
    command: '!f() { [ $# -gt 0 ] && git checkout "$1" && git unpublish && git checkout "$(git default-branch)" && git branch --delete --force "$1" && git checkout -b "$1" && git publish; }; f'
    description: Delete and recreate a branch based on main
    category: workflow
    risk: dangerous
    depends_on: [current-branch, default-branch, unpublish, publish]

  pruner:
    command: '!git prune --expire=now; git reflog expire --expire-unreachable=now --rewrite --all'
    description: Prune all unreachable objects immediately
    category: workflow
    risk: medium

  repacker:
    command: repack -a -d -f --depth=300 --window=300 --window-memory=1g
    description: Repack the repository for optimal storage
    category: workflow
    risk: medium

  optimizer:
    command: '!git pruner; git repacker; git prune-packed'
    description: Run pruner, repacker, and prune-packed to optimize the repo
    category: workflow
    risk: medium
    depends_on: [pruner, repacker]

  worktree-add:
    command: worktree add
    description: Add a new linked worktree (requires git >= 2.5)
    category: workflow
    risk: medium
    since_version: "2.5"

  worktree-list:
    command: worktree list
    description: List all worktrees for this repository (requires git >= 2.5)
    category: workflow
    risk: safe
    since_version: "2.5"

  worktree-remove:
    command: worktree remove
    description: Remove a linked worktree (requires git >= 2.17)
    category: workflow
    risk: medium
    since_version: "2.17"

  sparse-init:
    command: sparse-checkout init
    description: Enable sparse-checkout and initialize it for the repository (requires git >= 2.25)
    category: workflow
    risk: medium
    since_version: "2.25"

  sparse-set:
    command: sparse-checkout set
    description: Set the sparse-checkout path patterns (requires git >= 2.25)
    category: workflow
    risk: medium
    since_version: "2.25"
