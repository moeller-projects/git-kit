aliases:
  lg:
    command: log --graph --all --pretty=kit --date=short
    description: Graphical log of all branches with author and date
    category: log
    risk: safe

  ll:
    command: log --pretty=kit --date=short -20
    description: Last 20 commits with author and date
    category: log
    risk: safe

  lp:
    command: log --pretty=kit --date=short
    description: Pretty log with date and author
    category: log
    risk: safe

  lf:
    command: log --pretty=kit --date=short --stat
    description: Log with changed file stats and commit details
    category: log
    risk: safe

  who:
    command: shortlog -sn --no-merges
    description: Show commit count per contributor
    category: log
    risk: safe

  today:
    command: log --since=midnight --pretty=kit --date=short
    description: Show commits made since midnight
    category: log
    risk: safe
