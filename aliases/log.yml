aliases:
  lg:
    command: log --graph
    description: Log with a graphical representation of history
    category: log
    risk: safe

  lo:
    command: log --oneline
    description: Log with one line per commit
    category: log
    risk: safe

  lp:
    command: log --patch
    description: Log with patch generation
    category: log
    risk: safe

  ll:
    command: log-list
    description: Log list with preferred options (a.k.a. log-list)
    category: log
    risk: safe

  log-fresh:
    command: log ORIG_HEAD.. --stat --no-merges
    description: Show new commits since the last fetch
    category: log
    risk: safe

  log-list:
    command: log --graph --topo-order --date=short --abbrev-commit --decorate --all --boundary --pretty=format:'%Cblue%ad %C(auto)%h%Creset -%C(auto)%d%Creset %s %Cblue[%aN]%Creset %Cblue%G?%Creset'
    description: Preferred log list with graph, dates, and authors
    category: log
    risk: safe

  log-my:
    command: '!git log --author "$(git config user.email)"'
    description: Show only commits by the current user email
    category: log
    risk: medium

  log-1-day:
    command: log --since=1-day-ago
    description: Show commits from the past day
    category: log
    risk: safe

  log-1-week:
    command: log --since=1-week-ago
    description: Show commits from the past week
    category: log
    risk: safe

  log-my-day:
    command: '!git log --author "$(git config user.email)" --since=1-day-ago'
    description: Show my commits from the past day
    category: log
    risk: medium

  log-my-week:
    command: '!git log --author "$(git config user.email)" --since=1-week-ago'
    description: Show my commits from the past week
    category: log
    risk: medium

  log-refs:
    command: log --all --graph --decorate --oneline --simplify-by-decoration --no-merges
    description: Show decorated simplified graph of all refs
    category: log
    risk: safe

  log-local:
    command: log --oneline @{upstream}..HEAD
    description: Show local commits not yet pushed upstream
    category: log
    risk: safe

  log-fetched:
    command: log --oneline HEAD..@{upstream}
    description: Show fetched commits not yet merged
    category: log
    risk: safe

  whatis:
    command: show --no-patch --pretty='tformat:%h (%s, %ad)' --date=short
    description: Briefly describe any git object
    category: log
    risk: safe

  last:
    command: log -1 --oneline
    description: Show last commit
    category: log
    risk: safe

  commit-search:
    command: '!f() { git log --all --grep="$1" --oneline; }; f'
    description: Search commits by message
    category: log
    risk: medium

  commit-files:
    command: "show --name-only --pretty=format:"
    description: Show files affected by a commit
    category: log
    risk: safe

  ahead:
    command: rev-list --count @{upstream}..HEAD
    description: Number of commits ahead of upstream
    category: log
    risk: safe

  behind:
    command: rev-list --count HEAD..@{upstream}
    description: Number of commits behind upstream
    category: log
    risk: safe

  diverged:
    command: '!echo "ahead: $(git ahead) | behind: $(git behind)"'
    description: Show divergence from upstream
    category: log
    risk: medium

  showi:
    command: '!f() { commit=$(git log --oneline | fzf | cut -d" " -f1); [ -n "$commit" ] && git show "$commit"; }; f'
    description: Interactively select and show a commit
    category: log
    risk: medium

  log-changed:
    command: log --follow -p --
    description: Show full history of a single file including renames; usage git log-changed <path>
    category: log
    risk: safe

  standup:
    command: '!git log --all --author "$(git config user.email)" --since=yesterday.midnight --oneline --no-merges'
    description: Show your commits across all branches since yesterday (daily standup)
    category: log
    risk: medium
