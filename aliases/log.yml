aliases:
  lg:
    command: log --oneline --graph --decorate --all
    description: Graphical oneline log of all branches
    category: log
    risk: safe

  ll:
    command: log --oneline --decorate -20
    description: Last 20 commits as oneliners
    category: log
    risk: safe

  lp:
    command: "log --pretty=format:'%C(yellow)%h%Creset %ad %s %C(green)(%an)%Creset%C(auto)%d' --date=short"
    description: Pretty oneline log with date and author
    category: log
    risk: safe

  lf:
    command: log --oneline --stat
    description: Oneline log with changed file stats
    category: log
    risk: safe

  who:
    command: shortlog -sn --no-merges
    description: Show commit count per contributor
    category: log
    risk: safe

  today:
    command: log --since=midnight --oneline
    description: Show commits made since midnight
    category: log
    risk: safe
