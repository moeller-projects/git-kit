aliases:
  co:
    command: checkout
    description: Checkout a branch or path
    category: checkout
    risk: medium

  swb:
    command: switch --create
    description: Create and switch to a new branch (modern alternative to checkout -b, requires git >= 2.23)
    category: checkout
    risk: medium
    since_version: "2.23"

  swi:
    command: '!f() { command -v fzf >/dev/null 2>&1 || { echo "swi needs fzf (use: git switch <branch>)" >&2; return 2; }; b="$(git for-each-ref --format="%(refname:short)" refs/heads/ refs/remotes/origin/ | grep -v "^origin/HEAD$" | fzf --preview "git log --oneline --color=always -20 {}" --prompt="switch> ")"; [ -n "$b" ] || return 0; git switch "$(echo "$b" | sed "s#^origin/##")"; }; f'
    description: Interactively switch to a local or remote branch with commit preview (requires fzf)
    category: checkout
    risk: medium
    since_version: "2.23"

  swr:
    command: '!f() { command -v fzf >/dev/null 2>&1 || { echo "swr needs fzf" >&2; return 2; }; b="$(git for-each-ref --sort=-committerdate --count=20 --format="%(refname:short)" refs/heads/ | fzf --preview "git log --oneline --color=always -20 {}" --prompt="recent> ")"; [ -n "$b" ] || return 0; git switch "$b"; }; f'
    description: Interactively switch among the 20 most recently committed local branches (requires fzf)
    category: checkout
    risk: medium
    since_version: "2.23"

  sw-:
    command: switch -
    description: Switch back to the previously checked-out branch (requires git >= 2.23)
    category: checkout
    risk: safe
    since_version: "2.23"
