aliases:
  heads:
    command: '!git log "origin/$(git default-branch)".. --format=''%Cred%h%Creset;%C(yellow)%an%Creset;%H;%Cblue%f%Creset'' | git name-rev --stdin --always --name-only | column -t -s'';'''
    description: Show local commits not yet on origin/main
    category: branch
    risk: medium

  hew:
    command: '!git hew-local "$@" && git hew-remote "$@" #'
    description: Delete all merged branches locally and remotely
    category: branch
    risk: dangerous

  hew-dry-run:
    command: '!git hew-local-dry-run "$@" && git hew-remote-dry-run "$@" #'
    description: Preview branches that would be deleted by hew
    category: branch
    risk: medium

  hew-local:
    command: '!f() { git hew-local-dry-run "$@" | xargs git branch --delete ; }; f'
    description: Delete all locally merged branches
    category: branch
    risk: dangerous

  hew-local-dry-run:
    command: '!f() { commit=${1:-$(git current-branch)}; git branch --merged "$commit" | grep -v "^[[:space:]]*\\*[[:space:]]*$commit$" ; }; f'
    description: Preview locally merged branches to be deleted
    category: branch
    risk: medium

  hew-remote:
    command: '!f() { git hew-remote-dry-run "$@" | xargs -I% git push origin :% 2>&1 ; }; f'
    description: Delete all remotely merged branches
    category: branch
    risk: dangerous

  hew-remote-dry-run:
    command: '!f() { commit=${1:-$(git upstream-branch)}; git branch --remotes --merged "$commit" | grep -v "HEAD" | grep -v "^[[:space:]]*origin/$commit$" | sed ''s#[[:space:]]*origin/##'' ; }; f'
    description: Preview remotely merged branches to be deleted
    category: branch
    risk: medium

  recent:
    command: branch --sort=-committerdate
    description: List branches sorted by most recent commit date
    category: branch
    risk: safe

  branch-clean:
    command: '!f() { git branch-clean-dry-run "$@" | while IFS= read -r branch; do git branch -D -- "$branch"; done; }; f'
    description: Delete all local branches already merged into the base branch (non-interactive; default base e.g. dev)
    category: branch
    risk: dangerous

  branch-clean-dry-run:
    command: '!f() { base="${1:-$(git topic-base-branch)}"; cur="$(git current-branch)"; def="$(git default-branch)"; git rev-parse --verify --quiet "refs/heads/$base" >/dev/null || { echo "branch-clean: base branch ${base:-<unset>} not found" >&2; return 1; }; git for-each-ref --format="%(refname:short)" refs/heads/ | while IFS= read -r b; do [ "$b" = "$base" ] && continue; [ "$b" = "$cur" ] && continue; [ "$b" = "$def" ] && continue; [ "$b" = main ] && continue; [ "$b" = master ] && continue; git merge-base --is-ancestor "$b" "$base" && printf "%s\n" "$b"; done; }; f'
    description: Preview local branches fully merged into the base branch (default base; set init.topicBaseBranchName to dev)
    category: branch
    risk: medium

  branch-gone:
    command: '!f() { git branch-gone-dry-run | while IFS= read -r branch; do git branch -D -- "$branch"; done; }; f'
    description: Delete local branches whose remote tracking branch is gone (handles squash/rebase-merged PRs)
    category: branch
    risk: dangerous

  branch-gone-dry-run:
    command: '!f() { git fetch --prune --quiet || return 1; git for-each-ref --format="%(refname:short) %(upstream:track)" refs/heads/ | grep " \[gone\]$" | cut -d" " -f1; }; f'
    description: Preview local branches whose upstream was deleted on the remote (e.g. squash-merged PRs)
    category: branch
    risk: medium

  branch-rm:
    command: '!f() { command -v fzf >/dev/null 2>&1 || { echo "branch-rm needs fzf" >&2; return 2; }; git for-each-ref --format="%(refname:short)" refs/heads/ | fzf -m --preview "git log --oneline --color=always -20 {}" --prompt="delete branches (TAB to multi-select)> " | while IFS= read -r branch; do git branch -D -- "$branch"; done; }; f'
    description: Interactively multi-select local branches to delete with preview (requires fzf)
    category: branch
    risk: dangerous

  fork-point:
    command: '!f() { base="${1:-$(git topic-base-branch)}"; git merge-base "$base" HEAD; }; f'
    description: Show the commit where the current branch diverged from the base branch
    category: branch
    risk: medium

  branch-log:
    command: '!f() { base="${1:-$(git topic-base-branch)}"; git log --oneline "$base..HEAD"; }; f'
    description: Show commits added on the current branch since it diverged from the base
    category: branch
    risk: medium

  branch-diff:
    command: '!f() { base="${1:-$(git topic-base-branch)}"; git diff "$base...HEAD"; }; f'
    description: Show the cumulative PR-style diff of the current branch against the base
    category: branch
    risk: medium

  branch-files:
    command: '!f() { base="${1:-$(git topic-base-branch)}"; git diff --name-status "$base...HEAD"; }; f'
    description: List files changed on the current branch against the base
    category: branch
    risk: medium

  tidy:
    command: '!git fetch --prune && git branch-gone && git branch-clean'
    description: Fetch with prune, then delete gone and merged local branches (combines branch-gone and branch-clean)
    category: branch
    risk: dangerous
    depends_on: [branch-gone, branch-clean]

  sweep:
    command: '!git fetch --prune && git branch-gone && git branch-clean && git hew-local && git hew-remote-dry-run'
    description: Aggressive cleanup — fetch+prune, delete local gone/merged branches, and preview remote-merged branches
    category: branch
    risk: dangerous
    depends_on: [branch-gone, branch-clean, hew-local, hew-remote-dry-run]

  diverged-list:
    command: '!git for-each-ref --format="%(refname:short) %(upstream:track)" refs/heads/ | grep -E "(ahead|behind) [1-9]" | cut -d" " -f1'
    description: List local branches that are ahead or behind their upstream by at least 1 commit
    category: branch
    risk: medium
