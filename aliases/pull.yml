aliases:
  pf:
    command: pull --ff-only
    description: Pull only if it can fast-forward, else fail
    category: pull
    risk: safe

  pr:
    command: pull --rebase
    description: Pull with rebase for a cleaner linear history
    category: pull
    risk: medium

  prp:
    command: pull --rebase=merges
    description: Pull with rebase preserving merge commits (replaces deprecated --rebase=preserve, requires git >= 2.18)
    category: pull
    risk: medium
    since_version: "2.18"
