aliases:
  aa:
    command: add --all
    description: Add all files including untracked
    category: add
    risk: medium

  ap:
    command: add --patch
    description: Add files interactively by patch
    category: add
    risk: medium

  au:
    command: add --update
    description: Add only updated (already tracked) files
    category: add
    risk: medium

  edit-unmerged:
    command: '!f() { files=$(git ls-files --unmerged | cut -f2 | sort -u); [ -z "$files" ] || $(git var GIT_EDITOR) $files; }; f'
    description: Open all unmerged files in the editor during a merge conflict
    category: add
    risk: medium

  addi:
    command: '!f() { command -v fzf >/dev/null 2>&1 || { echo "addi needs fzf" >&2; return 2; }; { git ls-files --modified --others --exclude-standard; git diff --name-only; } | sort -u | fzf -m --preview "git diff --color=always -- {}" --prompt="stage> " | while IFS= read -r path; do git add -- "$path"; done; }; f'
    description: Interactively multi-select changed/untracked files to stage with diff preview (requires fzf)
    category: add
    risk: medium
