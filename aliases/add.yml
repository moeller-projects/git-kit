aliases:
  aa:
    command: add --all
    description: Add all files including untracked
    category: add
    risk: medium

  ap:
    command: add --patch
    description: Add files interactively by patch
    category: add
    risk: medium

  au:
    command: add --update
    description: Add only updated (already tracked) files
    category: add
    risk: medium

  add-cached:
    command: '!git add "$(git ls-files --cached             | sort -u)"'
    description: Add all cached files to the index
    category: add
    risk: medium

  add-deleted:
    command: '!git add "$(git ls-files --deleted            | sort -u)"'
    description: Add all deleted files to the index
    category: add
    risk: medium

  add-others:
    command: '!git add "$(git ls-files --others             | sort -u)"'
    description: Add all untracked files to the index
    category: add
    risk: medium

  add-ignored:
    command: '!git add "$(git ls-files --ignored            | sort -u)"'
    description: Add all ignored files to the index
    category: add
    risk: medium

  add-killed:
    command: '!git add "$(git ls-files --killed             | sort -u)"'
    description: Add all killed files to the index
    category: add
    risk: medium

  add-modified:
    command: '!git add "$(git ls-files --modified           | sort -u)"'
    description: Add all modified files to the index
    category: add
    risk: medium

  add-stage:
    command: '!git add "$(git ls-files --stage    | cut -f2 | sort -u)"'
    description: Add all staged files to the index
    category: add
    risk: medium

  add-unmerged:
    command: '!git add "$(git ls-files --unmerged | cut -f2 | sort -u)"'
    description: Add all unmerged files to the index
    category: add
    risk: medium

  edit-cached:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --cached             | sort -u)"'
    description: Open all cached files in the editor
    category: add
    risk: medium

  edit-deleted:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --deleted            | sort -u)"'
    description: Open all deleted files in the editor
    category: add
    risk: medium

  edit-others:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --others             | sort -u)"'
    description: Open all untracked files in the editor
    category: add
    risk: medium

  edit-ignored:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --ignored            | sort -u)"'
    description: Open all ignored files in the editor
    category: add
    risk: medium

  edit-killed:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --killed             | sort -u)"'
    description: Open all killed files in the editor
    category: add
    risk: medium

  edit-modified:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --modified           | sort -u)"'
    description: Open all modified files in the editor
    category: add
    risk: medium

  edit-stage:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --stage    | cut -f2 | sort -u)"'
    description: Open all staged files in the editor
    category: add
    risk: medium

  edit-unmerged:
    command: '!$(git var GIT_EDITOR) "$(git ls-files --unmerged | cut -f2 | sort -u)"'
    description: Open all unmerged files in the editor
    category: add
    risk: medium
