aliases:
  flow-task-start:
    command: '!f() { name="$1"; test -n "$name" || { echo "usage: git flow-task-start <name> [base]"; return 2; }; base="${2:-$(git default-branch)}"; path="$(git wt-path "task/$name")" || return; git worktree add -b "task/$name" "$path" "$base"; }; f'
    description: Start a task in a sibling worktree at ../<repo>-task-<name> with branch task/<name>
    category: flow
    risk: medium
    depends_on: [default-branch, wt-path]

  flow-task-done:
    command: '!f() { name="$1"; test -n "$name" || { echo "usage: git flow-task-done <name>"; return 2; }; path="$(git wt-path "task/$name")" || return; git worktree remove "$path" && git branch --delete "task/$name"; }; f'
    description: Remove the task worktree and delete the task branch (branch must be fully merged; git branch --delete enforces this)
    category: flow
    risk: medium
    depends_on: [wt-path]

  flow-feature-start:
    command: '!f() { name="$1"; test -n "$name" || { echo "usage: git flow-feature-start <name> [base]"; return 2; }; base="${2:-$(git default-branch)}"; path="$(git wt-path "feature/$name")" || return; git worktree add -b "feature/$name" "$path" "$base"; }; f'
    description: Start a feature branch in a sibling worktree at ../<repo>-feature-<name>
    category: flow
    risk: medium
    depends_on: [default-branch, wt-path]

  flow-feature-finish:
    command: '!f() { name="$1"; test -n "$name" || { echo "usage: git flow-feature-finish <name>"; return 2; }; base="$(git default-branch)"; path="$(git wt-path "feature/$name")" || return; git checkout "$base" && git merge --no-ff "feature/$name" && git worktree remove "$path" && git branch --delete "feature/$name"; }; f'
    description: Merge a feature branch into default, remove its worktree, and delete the branch; each step must succeed before the next runs
    category: flow
    risk: medium
    depends_on: [default-branch, wt-path]

  flow-hotfix-start:
    command: '!f() { name="$1"; test -n "$name" || { echo "usage: git flow-hotfix-start <name> [base]"; return 2; }; base="${2:-$(git default-branch)}"; path="$(git wt-path "hotfix/$name")" || return; git worktree add -b "hotfix/$name" "$path" "$base"; }; f'
    description: Start a hotfix branch in a sibling worktree at ../<repo>-hotfix-<name>
    category: flow
    risk: medium
    depends_on: [default-branch, wt-path]

  flow-release-start:
    command: '!f() { name="$1"; test -n "$name" || { echo "usage: git flow-release-start <name> [base]"; return 2; }; base="${2:-$(git default-branch)}"; path="$(git wt-path "release/$name")" || return; git worktree add -b "release/$name" "$path" "$base"; }; f'
    description: Start a release branch in a sibling worktree at ../<repo>-release-<name>
    category: flow
    risk: medium
    depends_on: [default-branch, wt-path]
