aliases:
  dc:
    command: diff --cached
    description: Show staged changes (alias for diff --cached)
    category: diff
    risk: safe

  dw:
    command: diff --word-diff
    description: Show changes but by word, not line
    category: diff
    risk: safe

  diff-deep:
    command: diff --check --dirstat --find-copies --find-renames --histogram --color
    description: Diff with extra checks, stats, and rename detection
    category: diff
    risk: safe

  staged:
    command: diff --staged --stat
    description: Show a stat summary of staged changes
    category: diff
    risk: safe

  unstaged:
    command: diff --stat
    description: Show a stat summary of unstaged changes
    category: diff
    risk: safe

  changed:
    command: diff --name-status
    description: Show names and status of changed files
    category: diff
    risk: safe

  conflicts:
    command: diff --name-only --diff-filter=U
    description: List files with unresolved merge conflicts
    category: diff
    risk: safe

  what-changed:
    command: diff --name-only HEAD
    description: List files changed since last commit
    category: diff
    risk: safe

  what-staged:
    command: diff --cached --name-only
    description: List staged files only
    category: diff
    risk: safe

  difftooli:
    command: '!f() { file=$(git diff --name-only | fzf); [ -n "$file" ] && git difftool -- "$file"; }; f'
    description: Interactively open difftool for a changed file
    category: diff
    risk: medium
