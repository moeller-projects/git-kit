aliases:
  wt-path:
    command: '!f() { branch="$1"; test -n "$branch" || { echo "usage: git wt-path <branch>"; return 2; }; root="$(git rev-parse --show-toplevel)" || return; repo="$(basename "$root")"; clean="$(printf "%s" "$branch" | tr "/" "-")"; printf "%s\n" "$(dirname "$root")/${repo}-${clean}"; }; f'
    description: Print absolute worktree path using <parent>/<repo>-<branch>
    category: worktree
    risk: medium

  wt-new:
    command: '!f() { branch="$1"; base="${2:-origin/$(git default-branch)}"; test -n "$branch" || { echo "usage: git wt-new <branch> [base]"; return 2; }; target="$(git wt-path "$branch")" || return; git worktree add -b "$branch" "$target" "$base"; }; f'
    description: Create a new worktree branch from a base
    category: worktree
    risk: medium
    depends_on: [default-branch, wt-path]

  wt-open:
    command: '!f() { branch="$1"; if test -z "$branch"; then command -v fzf >/dev/null 2>&1 || { echo "usage: git wt-open <branch> # or install fzf for interactive mode"; return 2; }; branch="$(git branch --all --format="%(refname:short)" | sed "s#^origin/##" | grep -v "^HEAD$" | sort -u | fzf --prompt="open worktree branch> ")"; fi; test -n "$branch" || return 1; target="$(git wt-path "$branch")" || return; git worktree add "$target" "$branch"; }; f'
    description: Open an existing branch in a new worktree; uses fzf when no branch is given
    category: worktree
    risk: medium
    depends_on: [wt-path]

  wt-open-cd:
    command: '!f() { branch="$1"; if test -z "$branch"; then command -v fzf >/dev/null 2>&1 || { echo "usage: git wt-open-cd <branch> # or install fzf"; return 2; }; branch="$(git branch --all --format="%(refname:short)" | sed "s#^origin/##" | grep -v "^HEAD$" | sort -u | fzf --prompt="open+cd branch> ")"; fi; test -n "$branch" || return 1; target="$(git wt-path "$branch")" || return; git worktree add "$target" "$branch" && printf "%s\n" "$target"; }; f'
    description: Open a branch in a new worktree and print the worktree path; uses fzf when no branch is given
    category: worktree
    risk: medium
    depends_on: [wt-path]

  wt-rm:
    command: '!f() { branch="$1"; test -n "$branch" || { echo "usage: git wt-rm <branch>"; return 2; }; target="$(git wt-path "$branch")" || return; git worktree remove "$target"; }; f'
    description: Remove a worktree by branch name
    category: worktree
    risk: medium
    depends_on: [wt-path]

  wt-done:
    command: '!f() { branch="$1"; if test -z "$branch"; then command -v fzf >/dev/null 2>&1 || { echo "usage: git wt-done <branch> # or install fzf for interactive mode"; return 2; }; path="$(git worktree list --porcelain | awk "/^worktree /{print substr($0,10)}" | fzf --prompt="done worktree> ")"; test -n "$path" || return 1; branch="$(git -C "$path" rev-parse --abbrev-ref HEAD)" || return; else path="$(git wt-path "$branch")" || return; fi; git worktree remove "$path" && git branch --delete "$branch"; }; f'
    description: Remove a worktree and delete its local branch; uses fzf when no branch is given
    category: worktree
    risk: medium
    depends_on: [wt-path]

  wt-done-force:
    command: '!f() { branch="$1"; test -n "$branch" || { echo "usage: git wt-done-force <branch>"; return 2; }; git worktree remove --force "$(git wt-path "$branch")" && git branch --delete --force "$branch"; }; f'
    description: Force-remove a worktree and force-delete its local branch
    category: worktree
    risk: dangerous
    depends_on: [wt-path]

  wt-list:
    command: worktree list
    description: List all worktrees for this repository
    category: worktree
    risk: safe

  wt-prune:
    command: worktree prune
    description: Prune stale worktree references
    category: worktree
    risk: medium

  wt-sync:
    command: '!f() { branch="$1"; test -n "$branch" || { echo "usage: git wt-sync <branch>"; return 2; }; target="$(git wt-path "$branch")" || return; git -C "$target" pull --ff-only; }; f'
    description: Fast-forward sync a named worktree from outside it by branch name
    category: worktree
    risk: medium

  wt-feature:
    command: '!f() { name="$1"; base="${2:-origin/$(git default-branch)}"; test -n "$name" || { echo "usage: git wt-feature <ado-id-short-title> [base]"; return 2; }; branch="feature/$name"; git wt-new "$branch" "$base" && git wt-path "$branch"; }; f'
    description: Create a Git-flow feature worktree for an Azure DevOps task
    category: worktree
    risk: medium
    depends_on: [wt-new, wt-path, default-branch]

  wt-bugfix:
    command: '!f() { name="$1"; base="${2:-origin/$(git default-branch)}"; test -n "$name" || { echo "usage: git wt-bugfix <ado-id-short-title> [base]"; return 2; }; branch="bugfix/$name"; git wt-new "$branch" "$base" && git wt-path "$branch"; }; f'
    description: Create a Git-flow bugfix worktree for an Azure DevOps task
    category: worktree
    risk: medium
    depends_on: [wt-new, wt-path, default-branch]

  wt-hotfix:
    command: '!f() { name="$1"; base="${2:-origin/$(git default-branch)}"; test -n "$name" || { echo "usage: git wt-hotfix <ado-id-short-title> [base]"; return 2; }; branch="hotfix/$name"; git wt-new "$branch" "$base" && git wt-path "$branch"; }; f'
    description: Create a Git-flow hotfix worktree for urgent production work
    category: worktree
    risk: medium
    depends_on: [wt-new, wt-path, default-branch]

  wt-release:
    command: '!f() { name="$1"; base="${2:-origin/$(git default-branch)}"; test -n "$name" || { echo "usage: git wt-release <version-or-name> [base]"; return 2; }; branch="release/$name"; git wt-new "$branch" "$base" && git wt-path "$branch"; }; f'
    description: Create a Git-flow release worktree
    category: worktree
    risk: medium
    depends_on: [wt-new, wt-path, default-branch]
