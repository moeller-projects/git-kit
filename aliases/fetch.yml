aliases:
  fa:
    command: fetch --all
    description: Fetch from all remotes
    category: fetch
    risk: safe

  fap:
    command: fetch --all --prune
    description: Fetch from all remotes and prune deleted branches
    category: fetch
    risk: safe

  pr-fetch:
    command: '!f() { [ -n "$1" ] || { echo "usage: git pr-fetch <number> [remote]" >&2; return 2; }; remote="${2:-origin}"; git fetch "$remote" "pull/$1/head:pr-$1" && git switch "pr-$1"; }; f'
    description: Fetch a GitHub pull request by number into a local branch and switch to it
    category: fetch
    risk: medium
